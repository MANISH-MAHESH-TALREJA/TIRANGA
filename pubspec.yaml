name: pokemon
description: INDIAN INDEPENDENCE DAY

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.6 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  audio_player:
    path: ./audio_player

  shimmer: ^3.0.0
  auto_animated: ^3.2.0
  quds_popup_menu: ^0.0.1+1
  flutter_file_downloader: ^1.1.2
  marquee_widget: ^1.2.0
  toast: ^0.3.0
  modal_bottom_sheet: ^3.0.0-pre
  avatar_glow: ^2.0.2
  url_launcher: ^6.1.12
  wallpaper_manager_flutter: ^0.0.2
  animated_background: ^2.0.0
  expandable: ^5.0.1
  esys_flutter_share_plus: ^2.2.0
  pull_to_refresh: ^2.0.0
  flip_card: ^0.7.0
  better_player: ^0.0.83
  animated_text_kit: ^4.2.2
  giff_dialog: ^1.0.1
  cached_network_image: ^3.2.3
  http: ^1.1.0
  firebase_messaging: ^14.6.5
  rflutter_alert: ^2.0.7
  permission_handler: ^10.4.3
  flutter_speed_dial: ^7.0.0
  bottom_navy_bar: ^6.0.0
  flutter_cache_manager: ^3.3.1
  in_app_update: ^4.1.4
  cross_connectivity: ^3.0.5
  contained_tab_bar_view: ^0.8.0
  open_file: ^3.3.2
  ringtone_set: ^0.0.3
  awesome_notifications: ^0.7.4+1
  searchable_listview: ^2.4.0
  firebase_core: ^2.15.0
  section_view: ^2.0.5
  device_info_plus: ^8.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.2

flutter:
  uses-material-design: true
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins.ttf
  assets:
    - assets/images/
    - assets/audio/
